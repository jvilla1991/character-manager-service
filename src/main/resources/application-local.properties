# ── Local profile ─────────────────────────────────────────────────────────────
# Mirrors the `dev` profile: same local PostgreSQL (table_mimic database,
# `character` schema). Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
#
# Requires a PostgreSQL listening on the port below with database `table_mimic`
# and role `table_mimic_user` / `localpassword` — the same instance the
# auth-service uses (it owns the `auth` schema; this service owns `character`).

spring.datasource.url=jdbc:postgresql://127.0.0.1:5434/table_mimic
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=table_mimic_user
spring.datasource.password=localpassword

spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=character

logging.level.org.flywaydb=INFO

# Local only — wipes and re-runs all migrations on checksum mismatch.
# Never set this in prod: it will drop your entire schema.
spring.flyway.clean-on-validation-error=true
spring.flyway.clean-disabled=false
